name: Build TWRP for Xiaomi Pad 7 (uke)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1

jobs:
  build:
    name: Build TWRP
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libncurses-dev lib32ncurses-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
            libssl-dev bc lzop kmod cpio rsync ccache

      - name: Set up repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Initialize TWRP manifest
        run: |
          mkdir -p twrp
          cd twrp
          repo init --depth=1 \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc) --no-clone-bundle --no-tags --force-sync

      - name: Copy device tree
        run: |
          mkdir -p twrp/device/xiaomi/uke
          cp -r device_tree/* twrp/device/xiaomi/uke/

      - name: Download kernel from LineageOS build
        run: |
          mkdir -p twrp/device/xiaomi/uke/prebuilt
          cd twrp/device/xiaomi/uke/prebuilt

          echo "Downloading LineageOS zip for kernel extraction..."
          # LineageOS build for uke contains the kernel
          curl -L "https://sourceforge.net/projects/irawansprojekt/files/uke/Android%2016/LineageOS/22%20October%202025/lineage-23.0-20251022-UNOFFICIAL-uke.zip/download" \
            -o lineage.zip --max-time 600 || true

          if [ -f lineage.zip ] && [ $(stat -c%s lineage.zip) -gt 1000000 ]; then
            echo "Extracting kernel from LineageOS zip..."
            unzip -o lineage.zip "boot.img" -d ./ 2>/dev/null || \
            unzip -o lineage.zip "*boot*" -d ./ 2>/dev/null || true

            BOOT_IMG=$(find . -name "boot.img" 2>/dev/null | head -1)
            if [ -n "$BOOT_IMG" ]; then
              python3 - <<'PYEOF'
          import struct, os

          boot_img = None
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f == 'boot.img':
                      boot_img = os.path.join(root, f)
                      break

          if not boot_img:
              print("boot.img not found")
              exit(1)

          print(f"Found: {boot_img}")
          with open(boot_img, 'rb') as f:
              data = f.read()

          magic = data[:8]
          print(f"Magic: {magic}")

          # v3/v4
          kernel_size = struct.unpack_from('<I', data, 8)[0]
          header_size = struct.unpack_from('<I', data, 20)[0]
          page_size = 4096
          kernel_offset = ((header_size + page_size - 1) // page_size) * page_size

          print(f"Kernel size: {kernel_size}, offset: {kernel_offset}")

          if kernel_size > 0:
              with open('kernel', 'wb') as f:
                  f.write(data[kernel_offset:kernel_offset + kernel_size])
              print(f"Kernel extracted successfully: {kernel_size} bytes")
          else:
              print("Kernel size is 0!")
          PYEOF
            fi
            rm -f lineage.zip
          else
            echo "Download failed or file too small, trying GKI fallback..."
            curl -L "https://dl.google.com/android/gki/gki-certified-boot-android14-6.1-2024-01_r1.zip" \
              -o gki.zip || true
            if [ -f gki.zip ] && [ $(stat -c%s gki.zip) -gt 1000 ]; then
              unzip -o gki.zip "*.img" -d ./ || true
              BOOT_IMG=$(ls boot*.img 2>/dev/null | head -1)
              if [ -n "$BOOT_IMG" ]; then
                python3 - <<'PYEOF2'
          import struct, os
          boot_img = [f for f in os.listdir('.') if f.startswith('boot') and f.endswith('.img')][0]
          with open(boot_img, 'rb') as f: data = f.read()
          kernel_size = struct.unpack_from('<I', data, 8)[0]
          header_size = struct.unpack_from('<I', data, 20)[0]
          kernel_offset = ((header_size + 4095) // 4096) * 4096
          if kernel_size > 0:
              with open('kernel', 'wb') as f: f.write(data[kernel_offset:kernel_offset+kernel_size])
              print(f"GKI kernel extracted: {kernel_size} bytes")
          PYEOF2
              fi
            fi
          fi

          echo "=== Prebuilt contents ==="
          ls -lh

      - name: Build TWRP vendor_boot
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
          . build/envsetup.sh
          lunch twrp_uke-eng
          mka vendorbootimage 2>&1 | tee build.log
          echo "Build exit code: $?"

      - name: Check output
        run: |
          echo "=== All images ==="
          find twrp/out/target/product/uke/ -name "*.img" -ls 2>/dev/null || echo "No images found"
          echo "=== vendor_boot ==="
          find twrp/out/ -name "vendor_boot*" -ls 2>/dev/null || echo "Not found"

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-vendor_boot-uke
          path: twrp/out/target/product/uke/vendor_boot.img
          if-no-files-found: warn

      - name: Upload all images (backup)
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-all-images-uke
          path: twrp/out/target/product/uke/*.img
          if-no-files-found: warn

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: twrp/build.log

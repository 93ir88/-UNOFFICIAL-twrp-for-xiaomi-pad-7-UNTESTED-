name: Build TWRP for Xiaomi Pad 7 (uke)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1
      CLEAN_BUILD:
        description: 'Clean build'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build TWRP
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:

      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libncurses-dev lib32ncurses-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
            libssl-dev bc lzop kmod cpio rsync ccache

      - name: Set up repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Initialize TWRP manifest
        run: |
          mkdir -p twrp
          cd twrp
          repo init --depth=1 \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc) --no-clone-bundle --no-tags --force-sync

      - name: Copy device tree
        run: |
          mkdir -p twrp/device/xiaomi/uke
          cp -r device_tree/* twrp/device/xiaomi/uke/

      - name: Download GKI prebuilt kernel (6.1)
        run: |
          mkdir -p twrp/device/xiaomi/uke/prebuilt
          cd twrp/device/xiaomi/uke/prebuilt

          # Download GKI kernel 6.1 for arm64
          # Build ID from device: android14-11
          GKI_URL="https://dl.google.com/android/gki/gki-certified-boot-android14-6.1-2024-01_r1.zip"
          echo "Downloading GKI kernel..."
          curl -L "$GKI_URL" -o gki.zip || true

          # Try alternative: extract from AOSP CI
          if [ ! -f gki.zip ] || [ $(stat -c%s gki.zip) -lt 1000 ]; then
            echo "Trying alternative kernel source..."
            curl -L "https://github.com/aosp-mirror/kernel_common/raw/android14-6.1/arch/arm64/boot/Image" \
              -o kernel || true
          fi

          if [ -f gki.zip ] && [ $(stat -c%s gki.zip) -gt 1000 ]; then
            unzip -o gki.zip "*.img" -d ./ || true
            # Extract kernel from boot image
            BOOT_IMG=$(ls boot*.img 2>/dev/null | head -1)
            if [ -n "$BOOT_IMG" ]; then
              python3 - <<'PYEOF'
          import struct, sys, os

          boot_img = None
          for f in os.listdir('.'):
              if f.startswith('boot') and f.endswith('.img'):
                  boot_img = f
                  break

          if not boot_img:
              print("No boot img found")
              sys.exit(1)

          with open(boot_img, 'rb') as f:
              data = f.read()

          # v3/v4 header
          kernel_size = struct.unpack_from('<I', data, 8)[0]
          header_size = struct.unpack_from('<I', data, 20)[0]
          page_size = 4096
          kernel_offset = ((header_size + page_size - 1) // page_size) * page_size

          if kernel_size > 0:
              with open('kernel', 'wb') as f:
                  f.write(data[kernel_offset:kernel_offset + kernel_size])
              print(f"Kernel extracted: {kernel_size} bytes")
          else:
              print("Kernel size is 0, skipping")
          PYEOF
            fi
          fi

          ls -la

      - name: Build TWRP vendor_boot
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
          . build/envsetup.sh
          lunch twrp_uke-eng
          mka vendorbootimage -j$(nproc) 2>&1 | tee build.log
          echo "Build finished with exit code: $?"

      - name: Check output
        run: |
          ls -lh twrp/out/target/product/uke/ 2>/dev/null || echo "Output dir not found"
          find twrp/out/target/product/uke/ -name "*.img" 2>/dev/null || echo "No images found"

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-vendor_boot-uke
          path: twrp/out/target/product/uke/vendor_boot.img
          if-no-files-found: warn

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: twrp/build.log

name: Build TWRP for Xiaomi Pad 7 (uke)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Cleanup Space
        run: |
          sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc
          sudo apt-get clean

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential zip curl libssl-dev python3 python-is-python3 rsync flex bison

      - name: Set up Repo
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Sync Minimal Manifest
        run: |
          mkdir twrp && cd twrp
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -j$(nproc --all) --force-sync --no-tags --no-clone-bundle

      - name: Build vendor_boot
        run: |
          cd twrp
          mkdir -p device/xiaomi/uke
          cp -r ../* device/xiaomi/uke/
          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh
          lunch twrp_uke-eng
          mka vendorbootimage -j$(nproc --all)

      - name: Upload Image
        uses: actions/upload-artifact@v3
        with:
          name: TWRP-uke-vendor_boot
          path: twrp/out/target/product/uke/vendor_boot.img
